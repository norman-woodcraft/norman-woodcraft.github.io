<!DOCTYPE html>
<html>
<head>
  <title>Our Wooden Collection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Our Wooden Collection</h1>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="products.html">Products</a>
  <a href="contact.html">Contact</a>
</nav>

<section class="products">

<!-- 4x4 Pickup -->
<div class="card">
  <img src="images/wooden-4x4-pickup-1.jpg" class="main" alt="Wooden 4x4 Pickup Toy" loading="lazy">
  <div class="card-content">
    <h3>Wooden 4x4 Pickup</h3>
    <div class="gallery">
      <img src="images/wooden-4x4-pickup-1.jpg" class="active-thumb" loading="lazy">
      <img src="images/wooden-4x4-pickup-2.jpg" loading="lazy">
      <img src="images/wooden-4x4-pickup-4.jpg" loading="lazy">
    </div>
    <a href="https://wa.me/254705845918" class="btn" target="_blank">Order on WhatsApp</a>
  </div>
</div>

<!-- Boat -->
<div class="card">
  <img src="images/boat-decor-1.jpg" class="main" loading="lazy">
  <div class="card-content">
    <h3>Boat</h3>
    <div class="gallery">
      <img src="images/boat-decor-3.jpg" class="active-thumb" loading="lazy">
      <img src="images/boat-decor-2.jpg" loading="lazy">
      <img src="images/boat-decor-6.jpg" loading="lazy">
    </div>
    <a href="https://wa.me/254705845918" class="btn" target="_blank">Order on WhatsApp</a>
  </div>
</div>

<!-- Off Road SUV -->
<div class="card">
  <img src="images/off-road-suv-1.jpg" class="main" loading="lazy">
  <div class="card-content">
    <h3>Off Road SUV</h3>
    <div class="gallery">
      <img src="images/off-road-suv-1.jpg" class="active-thumb" loading="lazy">
      <img src="images/off-road-suv-2.jpg" loading="lazy">
      <img src="images/off-road-suv-3.jpg" loading="lazy">
      <img src="images/off-road-suv-ver4-3.jpg" loading="lazy">
      <img src="images/off-road-suv-ver4-2.jpg" loading="lazy">
      <img src="images/off-road-suv-ver4.jpg" loading="lazy">
      <img src="images/off-road-suv-ver4-4.jpg" loading="lazy">
    </div>
    <a href="https://wa.me/254705845918" class="btn" target="_blank">Order on WhatsApp</a>
  </div>
</div>

<!-- (Other cards remain same structure — just ensure first thumbnail has class="active-thumb") -->

</section>

<footer>
  © 2026 Woodel | Made in Kenya
</footer>


<!-- FULLSCREEN IMAGE MODAL -->
<div id="imageModal" class="image-modal">
  <span class="close-modal">&times;</span>
  <img class="modal-content" id="modalImage">
</div>


<script>
document.addEventListener("DOMContentLoaded", function () {

  const galleries = document.querySelectorAll(".gallery");

  galleries.forEach(gallery => {
    const card = gallery.closest(".card");
    const mainImage = card.querySelector(".main");
    const thumbnails = gallery.querySelectorAll("img");

    thumbnails.forEach(thumb => {
      thumb.addEventListener("click", function () {

        mainImage.src = this.src;

        thumbnails.forEach(img => img.classList.remove("active-thumb"));
        this.classList.add("active-thumb");

      });
    });

    // Fullscreen on main image click
    mainImage.addEventListener("click", function() {
      document.getElementById("imageModal").style.display = "flex";
      document.getElementById("modalImage").src = this.src;
    });

  });

  // Close modal
  document.querySelector(".close-modal").onclick = function() {
    document.getElementById("imageModal").style.display = "none";
  };

  document.getElementById("imageModal").onclick = function(e) {
    if (e.target === this) {
      this.style.display = "none";
    }
  };

});
</script>

</body>
</html>
